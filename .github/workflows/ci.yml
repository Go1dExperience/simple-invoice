name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Format, lint, types, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate --workspace backend
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  e2e:
    name: API e2e (create invoice -> appears in list)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: simpleinvoice_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/simpleinvoice_test
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 3600
      SEED_USER_EMAIL: reviewer@simpleinvoice.io
      SEED_USER_PASSWORD: Password123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate --workspace backend
      - run: npm run migrate:deploy --workspace backend
      - run: npm run seed
      - run: npm run test:e2e --workspace backend
